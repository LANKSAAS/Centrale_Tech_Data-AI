<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accès refusé</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fff5f5;
      --surface: #ffffff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --accent: #dc2626;
      --accent-light: #fee2e2;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 52px 40px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }

    .icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .icon-wrap svg { width: 38px; height: 38px; stroke: var(--accent); }

    h1 { font-size: 1.6rem; font-weight: 700; }
    p  { font-size: 0.95rem; color: var(--muted); line-height: 1.5; }

    a {
      display: inline-block;
      margin-top: 8px;
      padding: 12px 28px;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.18s, transform 0.1s;
    }
    a:hover  { opacity: 0.88; }
    a:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <!-- cadenas -->
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
    </div>

    <h1>Accès refusé.</h1>
    <p>Nous n'avons pas pu vérifier votre identité. Veuillez réessayer.</p>

    <a href="/">Retour à l'accueil</a>
  </div>
</body>
</html>
