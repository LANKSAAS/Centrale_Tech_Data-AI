<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant IA Local</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>Assistant IA Local</h1>
        <p class="subtitle">Propulsé par Gemma 3 1B — Google DeepMind</p>
    </header>

    <main class="container">
        <div class="panel input-panel">
            <h2>Votre prompt</h2>
            <form method="POST">
                <textarea
                    name="prompt"
                    id="prompt"
                    placeholder="Entrez votre question ici..."
                    rows="10"
                ></textarea>
                <button type="submit" class="btn-submit">Demander à l'IA</button>
            </form>
        </div>

        <div class="panel result-panel">
            <h2>Résultat</h2>
            <div class="result-box">
                {% if resultat %}
                    <p>{{ resultat }}</p>
                {% else %}
                    <p class="placeholder">Le résultat apparaîtra ici après votre demande...</p>
                {% endif %}
            </div>
        </div>
    </main>
</body>
</html>
